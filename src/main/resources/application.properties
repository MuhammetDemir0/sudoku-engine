# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=sudoku-engine

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/sudoku_db
spring.datasource.username=sudoku_user
spring.datasource.password=sudoku_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging Configuration
logging.level.root=INFO
logging.level.com.sudokuengine=DEBUG

# Encoding
spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true
spring.web.encoding.force=true
