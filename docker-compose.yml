version: '3.8'

services:
  postgresql:
    image: postgres:16-alpine
    container_name: sudoku-engine-postgres
    environment:
      POSTGRES_DB: sudoku_db
      POSTGRES_USER: sudoku_user
      POSTGRES_PASSWORD: sudoku_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sudoku_user -d sudoku_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sudoku-network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sudoku-engine-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sudokuengine.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgresql
    networks:
      - sudoku-network

volumes:
  postgres_data:
    driver: local

networks:
  sudoku-network:
    driver: bridge
