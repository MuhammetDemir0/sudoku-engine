# Production profile
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:sudokudb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.h2.console.enabled=false

spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.sql.init.mode=${SQL_INIT_MODE:never}

# Keep hosted health checks simple and avoid exposing internals publicly.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=${HEALTH_SHOW_DETAILS:never}
management.endpoint.health.probes.enabled=true

# Respect reverse-proxy headers from the hosting platform.
server.forward-headers-strategy=framework

# Production logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.sudokuengine=${LOG_LEVEL_APP:INFO}
