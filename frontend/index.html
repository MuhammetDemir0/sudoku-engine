<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Engine</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="difficulty-tabs" aria-label="Difficulty">
                <span>Zorluk:</span>
                <button class="difficulty-tab" type="button" data-difficulty="EASY" aria-pressed="false">Kolay</button>
                <button class="difficulty-tab active" type="button" data-difficulty="MEDIUM" aria-pressed="true">Orta</button>
                <button class="difficulty-tab" type="button" data-difficulty="HARD" aria-pressed="false">Zor</button>
                <button class="difficulty-tab" type="button" data-difficulty="EXPERT" aria-pressed="false">Uzman</button>
            </div>
            <input id="difficulty" type="hidden" value="MEDIUM">
            <p id="statusText" class="status-text" aria-live="polite">Ready</p>
        </header>

        <main class="workspace">
            <section class="board-panel" aria-label="Sudoku board">
                <div id="board" class="sudoku-board"></div>
                <div id="numberPad" class="number-pad" aria-label="Number pad">
                    <button type="button" data-value="1"><span class="remaining-count">9</span><span class="pad-value">1</span></button>
                    <button type="button" data-value="2"><span class="remaining-count">9</span><span class="pad-value">2</span></button>
                    <button type="button" data-value="3"><span class="remaining-count">9</span><span class="pad-value">3</span></button>
                    <button type="button" data-value="4"><span class="remaining-count">9</span><span class="pad-value">4</span></button>
                    <button type="button" data-value="5"><span class="remaining-count">9</span><span class="pad-value">5</span></button>
                    <button type="button" data-value="6"><span class="remaining-count">9</span><span class="pad-value">6</span></button>
                    <button type="button" data-value="7"><span class="remaining-count">9</span><span class="pad-value">7</span></button>
                    <button type="button" data-value="8"><span class="remaining-count">9</span><span class="pad-value">8</span></button>
                    <button type="button" data-value="9"><span class="remaining-count">9</span><span class="pad-value">9</span></button>
                </div>
            </section>

            <aside class="side-panel" aria-label="Puzzle controls">
                <div class="game-stats">
                    <div>
                        <span>Hatalar</span>
                        <strong id="mistakeCount">0/3</strong>
                    </div>
                    <div>
                        <span>S&#252;re</span>
                        <strong id="timerDisplay">00:00</strong>
                    </div>
                </div>

                <div class="tool-row">
                    <button id="undoBtn" class="round-tool" type="button" aria-label="Undo last move">&#8630;</button>
                    <button id="clearBtn" class="round-tool" type="button" aria-label="Clear selected cell">&#9003;</button>
                    <button id="pencilBtn" class="round-tool pencil-tool" type="button" aria-label="Toggle pencil notes" aria-pressed="false">
                        <span class="pencil-glyph" aria-hidden="true">&#9998;</span>
                        <span id="pencilState" class="tool-state">Off</span>
                    </button>
                    <button id="hintBtn" class="round-tool hint-tool" type="button" aria-label="Get a hint">
                        <span aria-hidden="true">&#9906;</span>
                        <span id="hintCount" class="hint-badge">0</span>
                    </button>
                    <button id="pauseGameBtn" class="round-tool" type="button" aria-label="Pause game">&#10074;&#10074;</button>
                </div>

                <button id="generateBtn" class="primary-action" type="button">Yeni Oyun</button>
                <button id="resetBtn" class="secondary-action" type="button">Ba&#351;tan Ba&#351;la</button>

                <section class="message-panel" aria-label="Current message">
                    <p id="messageText">Yeni oyun ba&#351;lat veya tahtaya say&#305; gir.</p>
                </section>
            </aside>
        </main>
    </div>

    <div id="loadingOverlay" class="loading-overlay" hidden aria-live="polite" aria-busy="true">
        <div class="loading-card">
            <span class="loading-spinner" aria-hidden="true"></span>
            <p id="loadingText">Loading</p>
        </div>
    </div>

    <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/js/game.js"></script>
</body>
</html>
