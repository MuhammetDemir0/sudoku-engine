name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Compile
        run: mvn -B compile
        working-directory: backend

      - name: Run unit tests
        run: mvn -B test
        working-directory: backend

      - name: Run integration checks and package
        run: mvn -B verify
        working-directory: backend

      - name: Verify Docker build
        run: docker build -t sudoku-engine:ci .
